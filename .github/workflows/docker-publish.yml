name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag"
        required: false
        default: "latest"
  push:
    branches: [main]
    tags:
      - "v*.*.*"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || 'latest' }}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/mlops-group38-emotion:${{ steps.tag.outputs.tag }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlops-group38-emotion:${{ steps.tag.outputs.tag }}

      - name: Smoke-test container
        continue-on-error: true
        run: |
          docker run --rm \
            -e HF_TOKEN="${{ secrets.HF_TOKEN }}" \
            -e INPUT_TEXT="I feel so happy and excited today!" \
            ${{ secrets.DOCKERHUB_USERNAME }}/mlops-group38-emotion:${{ steps.tag.outputs.tag }}
