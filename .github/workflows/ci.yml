name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Lint with flake8
        run: flake8 src/ --max-line-length=120

  test-inference:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify inference module imports
        run: python -c "from src.inference.infrence_from_hub import run_inference; print('Import OK')"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
